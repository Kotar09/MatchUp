<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MatchUp — S'inscrire</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/register.css" />
</head>
<body>

  <header class="landing-header">
    <img src="../img/MatchUp.png" alt="MatchUp Logo" class="logo" />
    <a href="../pages/login.html" class="btn-white">Connexion</a>
  </header>

  <main class="register-page">
    <h1>Je suis...</h1>
    <p class="register-subtitle">Choisis ton profil pour commencer</p>

    <div class="register-choices">

      <a href="../pages/student.html" class="register-card">
        <div class="register-phone">
          <div class="register-phone-tag">Étudiant</div>
          <div class="register-phone-icon">👤</div>
          <div class="register-phone-check">✓</div>
        </div>
        <h3>Je suis Étudiant</h3>
        <p>Je cherche une alternance</p>
      </a>

      <a href="../pages/company.html" class="register-card">
        <div class="register-phone">
          <div class="register-phone-tag">Entreprise</div>
          <div class="register-phone-icon">🏢</div>
          <div class="register-phone-check">✓</div>
        </div>
        <h3>Je suis Entreprise</h3>
        <p>Je recrute un alternant</p>
      </a>

    </div>
  </main>

</body>
</html>
